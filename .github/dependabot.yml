version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      solana:
        patterns: ['@solana/*', 'bs58']
      dev-deps:
        dependency-type: development
    labels: [dependencies]
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies, ci]
    commit-message:
      prefix: chore(deps)
