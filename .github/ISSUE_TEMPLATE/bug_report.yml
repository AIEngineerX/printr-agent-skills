name: Bug report
description: Report a bug in a skill, the src/ library, or the docs
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: For security issues, see SECURITY.md — do NOT open a public issue.

  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or a commit SHA
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Include the error, logs, and stack trace if you have them.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Commands or code that triggers it. A failing test case is ideal.
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: Node version, OS, RPC provider — whatever's relevant.
      placeholder: 'Node 20, macOS 14, Helius free tier'
