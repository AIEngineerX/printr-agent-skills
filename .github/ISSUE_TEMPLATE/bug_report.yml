name: Bug report
description: Report a bug in a skill, the src/ library, or the docs
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For security issues, please see SECURITY.md and do NOT open a public issue.

  - type: input
    id: version
    attributes:
      label: Version
      description: Git tag or commit SHA you were using
      placeholder: v0.1.0
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - printr-swap
        - printr-agent-payments
        - printr-tokenized-agent
        - src/ library
        - CI / tooling
        - docs
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Actual behavior. Paste the error, logs, and stack trace if you have them.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Commands or code that triggers the bug. If you can isolate it to a test case, that is ideal.
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: '20.11.0'
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: 'macOS 14.3 / Ubuntu 22.04 / Windows 11'
    validations:
      required: true

  - type: input
    id: rpc
    attributes:
      label: RPC provider
      description: Which Solana RPC are you using? Helius, Ankr, custom, etc.
      placeholder: 'Helius free tier'
