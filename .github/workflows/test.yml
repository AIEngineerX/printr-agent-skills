name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Format check
        run: npx prettier --check .

      - name: Typecheck
        run: npx tsc --noEmit

      # Validate the published-artifact compile path. A break here means
      # `npm install` from a git URL (which runs `prepare` → `npm run build`)
      # would ship broken `dist/` to adopters.
      - name: Build dist
        run: npx tsc --project tsconfig.build.json

      # SKILL_LIVE=0 skips the live Jupiter integration tests — CI shouldn't
      # hammer the public lite-api on every push. Run them locally via
      # `npm run test:live` or in a nightly workflow against the paid tier.
      - name: Tests (offline)
        run: SKILL_LIVE=0 npx vitest run
