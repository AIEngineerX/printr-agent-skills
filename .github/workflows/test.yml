name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node 18 is dropped from CI: vitest 4.x's transitive rolldown dep imports
        # `styleText` from `node:util`, which was added in Node 20.12. The KIT's
        # compiled runtime code (dist/) still works on Node 18 — only the test
        # toolchain requires 20+. package.json `engines.node` stays at ">=18"
        # for runtime adopters; the matrix here is just what we test against.
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Format check
        run: npx prettier --check .

      - name: Typecheck
        run: npx tsc --noEmit

      # Validate the published-artifact compile path. A break here means
      # `npm install` from a git URL (which runs `prepare` → `npm run build`)
      # would ship broken `dist/` to adopters.
      - name: Build dist
        run: npx tsc --project tsconfig.build.json

      # SKILL_LIVE=0 skips the live Jupiter integration tests — CI shouldn't
      # hammer the public lite-api on every push. Run them locally via
      # `npm run test:live` or in a nightly workflow against the paid tier.
      - name: Tests (offline)
        run: SKILL_LIVE=0 npx vitest run
